version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: anime_db
    environment:
      POSTGRES_USER: ${DB_USER:-anime_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-anime_password}
      POSTGRES_DB: ${DB_NAME:-anime_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - anime_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-anime_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: anime_redis
    ports:
      - "6379:6379"
    networks:
      - anime_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: anime_backend
    environment:
      DATABASE_URL: postgresql://${DB_USER:-anime_user}:${DB_PASSWORD:-anime_password}@db:5432/${DB_NAME:-anime_db}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_prod}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-super_secret_refresh_key_change_in_prod}
      PORT: 5000
      NODE_ENV: development
      EXTERNAL_API_URL: ${EXTERNAL_API_URL:-} # Опционально: URL внешнего API (Anilist и т.д.)
      EXTERNAL_API_KEY: ${EXTERNAL_API_KEY:-} # Опционально: Ключ внешнего API
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - anime_network
    command: sh -c "npx prisma migrate deploy && npm run dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: anime_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - anime_network
    command: npm run dev

volumes:
  postgres_data:

networks:
  anime_network:
    driver: bridge
